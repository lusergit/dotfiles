[modules]
left = [ [ "Workspaces", "WindowTitle" ] ]
center = [ "Tempo" ]
right = ["MediaPlayer", [ "Tray", "Privacy", "Settings" ] ]

# Modus Vivendi theme for ashell
# Based on https://protesilaos.com/emacs/modus-themes-colors
# Modus Vivendi: dark theme with WCAG AAA contrast compliance

[appearance]
font_name = "Cascadia Code"
scale_factor = 1.3
style = "Solid"

# fg-main (#ffffff) — default text color
text_color = "#ffffff"

# green (#44bc44) — success indicators
success_color = "#44bc44"

# Workspace colors: use accent colors from the palette
# blue-warmer, magenta-cooler, cyan-cooler
workspace_colors = ["#79a8ff", "#b6a0ff", "#6ae4b9"]

# primary_color: blue-warmer (#79a8ff) — buttons, slider handles
# text: bg-main (#000000) for legibility on the bright blue
[appearance.primary_color]
base = "#79a8ff"
strong = "#99c0ff"
weak = "#5a88df"
text = "#000000"

# secondary_color: bg-active (#535353) — borders, slider tracks
[appearance.secondary_color]
base = "#535353"
strong = "#646464"
weak = "#303030"

# danger_color: red (#ff5f59) — errors/danger
# weak variant: yellow-warmer (#fec43f) — warnings
[appearance.danger_color]
base = "#ff5f59"
strong = "#ff5f5f"
weak = "#fec43f"

# background_color: bg-main (#000000) — main background
# weak: bg-inactive (#303030) — inactive/secondary surfaces
# strong: bg-active (#535353) — active/highlight surfaces
[appearance.background_color]
base = "#000000"
weak = "#303030"
strong = "#535353"
text = "#ffffff"
